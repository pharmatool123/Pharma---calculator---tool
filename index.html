<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma Margin Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
        }
        .calculator-box {
            max-width: 400px;
            background: white;
            padding: 20px;
            margin: 0 auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background-color: #27ae60;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #219150;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f8f5;
            border-left: 5px solid #27ae60;
            display: none;
        }
    </style>
</head>
<body>

    <div class="calculator-box">
        <h2>Medicine Margin Calculator</h2>
        
        <label for="mrp">MRP (₹):</label>
        <input type="number" id="mrp" placeholder="Enter Maximum Retail Price">
        
        <label for="purchase">Purchase Price (₹):</label>
        <input type="number" id="purchase" placeholder="Enter Wholesale/Purchase Price">
        
        <button onclick="calculateMargin()">Calculate Margin</button>

        <div class="result-box" id="resultBox">
            <h3 style="margin-top: 0; color: #27ae60;">Result:</h3>
            <p id="profitRupees"></p>
            <p id="profitPercent"></p>
        </div>
    </div>

    <script>
        function calculateMargin() {
            let mrp = parseFloat(document.getElementById('mrp').value);
            let purchase = parseFloat(document.getElementById('purchase').value);
            
            if (mrp > 0 && purchase > 0) {
                let marginRupees = mrp - purchase;
                // Margin is usually calculated on the selling price (MRP) in retail
                let marginPercentage = (marginRupees / mrp) * 100; 
                
                document.getElementById('profitRupees').innerHTML = "<b>Net Profit:</b> ₹" + marginRupees.toFixed(2);
                document.getElementById('profitPercent').innerHTML = "<b>Margin Percentage:</b> " + marginPercentage.toFixed(2) + "%";
                document.getElementById('resultBox').style.display = "block";
            } else {
                alert("Please enter valid MRP and Purchase Price!");
            }
        }
    </script>

</body>
</html>
